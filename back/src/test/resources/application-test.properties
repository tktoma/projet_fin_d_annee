# Base H2 en mémoire — isolée des données de dev
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Désactive les appels IGDB/Twitch pendant les tests
igdb.client-id=test-client-id
igdb.client-secret=test-client-secret

# JWT de test — secret court suffisant pour HMAC-SHA
jwt.secret=test-secret-key-suffisamment-longue-pour-hmac
jwt.expiration=86400000
jwt.refresh-expiration=2592000000

# Permet à @SpringBootTest de coexister avec les TestSecurityConfig des @WebMvcTest
# sans BeanDefinitionOverrideException (filterChain défini dans plusieurs contextes de test)
spring.main.allow-bean-definition-overriding=true